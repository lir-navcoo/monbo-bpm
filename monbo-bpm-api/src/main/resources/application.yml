server:
  port: 8080

spring:
  application:
    name: monbo-bpm-api
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:monbo_bpm}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  sql:
    init:
      mode: never
  web:
    throw-exception-if-no-handler-found: true
  mvc:
    throw-exception-if-no-handler-found: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

camunda:
  bpm:
    auto-deployment-enabled: true
    default-number-of-retries: 3
    historyTimeToLive: P30D  # 默认30天历史保留
# JWT 配置（生产环境通过环境变量覆盖）
jwt:
  secret: ${JWT_SECRET:monbo-bpm-jwt-secret-key-2026-very-long-and-secure-256bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
