name: Build and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'monbo-bpm-api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  SERVER_HOST: 101.126.89.23
  SERVER_USER: root
  SERVER_PATH: /opt/monbo-bpm/source-api
  DEPLOY_PATH: /opt/monbo-bpm/api

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Pull & Build & Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
            -A ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} '
            set -e
            mkdir -p ${{ env.SERVER_PATH }}

            # 确保 git 和 maven 可用（CentOS Stream 9）
            if ! command -v git >/dev/null 2>&1; then
              echo "[SETUP] Installing git..."
              yum install -y -q git > /dev/null 2>&1 || dnf install -y -q git > /dev/null 2>&1
            fi
            if ! command -v mvn >/dev/null 2>&1; then
              echo "[SETUP] Installing maven..."
              yum install -y -q maven > /dev/null 2>&1 || dnf install -y -q maven > /dev/null 2>&1
            fi

            if [ ! -f "${{ env.SERVER_PATH }}/.git/config" ]; then
              echo "[INIT] First time: git clone..."
              git clone git@github.com:lir-navcoo/monbo-bpm.git ${{ env.SERVER_PATH }}
            fi

            cd ${{ env.SERVER_PATH }}
            git fetch origin main

            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)
            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "[SKIP] No new commits, skipping build."
              exit 0
            fi

            echo "[BUILD] Pulling and building..."
            git reset --hard origin/main
            mvn clean package -DskipTests

            echo "[DEPLOY] Swapping JAR..."
            JAR=$(ls monbo-bpm-api/target/*.jar | head -1)
            mv ${{ env.DEPLOY_PATH }}/app.jar ${{ env.DEPLOY_PATH }}/app.jar.bak 2>/dev/null || true
            cp "$JAR" ${{ env.DEPLOY_PATH }}/app.jar

            systemctl daemon-reload
            systemctl restart monbo-bpm-api
            echo "[DONE] Deployed successfully"
          '

      - name: Verify deployment
        run: |
          sleep 25
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            http://${{ env.SERVER_HOST }}/api/auth/login \
            -X POST -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}' || echo '000')
          echo "Backend HTTP response: $HTTP_CODE"
          if [ "$HTTP_CODE" = '200' ]; then
            echo 'Deployment verified successfully'
          fi
