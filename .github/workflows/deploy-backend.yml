name: Build and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'monbo-bpm-api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  SERVER_HOST: 101.126.89.23
  SERVER_USER: root

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: |
          cd monbo-bpm-api
          mvn clean package -DskipTests -q
          echo "JAR built: $(ls target/*.jar 2>/dev/null | head -1)"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy JAR to server
        run: |
          JAR=$(ls monbo-bpm-api/target/*.jar | head -1)
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60" \
            "$JAR" ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/opt/monbo-bpm/api/app.jar

      - name: Restart backend
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} '
            systemctl daemon-reload
            systemctl restart monbo-bpm-api
            echo "Backend restarted"
          '

      - name: Verify deployment
        run: |
          sleep 25
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            http://${{ env.SERVER_HOST }}/api/auth/login \
            -X POST -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}' || echo '000')
          echo "Backend HTTP response: $HTTP_CODE"
          if [ "$HTTP_CODE" = '200' ]; then
            echo 'Deployment verified successfully'
          fi
