name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 101.126.89.23
  SERVER_PORT: 22
  SERVER_USER: root
  DEPLOY_PATH: /opt/monbo-bpm

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build UI
        working-directory: ./monbo-bpm-ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build API
        working-directory: ./monbo-bpm-api
        run: mvn clean package -DskipTests

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy UI to server
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }}/ui/dist
            rm -rf ${{ env.DEPLOY_PATH }}/ui/dist/*
          "
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -r ./monbo-bpm-ui/dist/* \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/ui/dist/

      - name: Deploy API to server
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ./monbo-bpm-api/target/*.jar \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/api/app.jar

      - name: Restart services
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "
            systemctl restart monbo-bpm-api || true
            systemctl restart nginx
          "

      - name: Verify deployment
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}/ || echo "000")
          echo "Server response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment verified successfully"
          else
            echo "Warning: Server returned $HTTP_CODE"
          fi
